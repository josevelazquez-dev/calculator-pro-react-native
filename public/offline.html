<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Pro - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 360px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 15px; color: #8E8E93; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: #4F7DFF;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📵</div>
    <h1>No internet connection</h1>
    <p>Calculator Pro needs a network connection to load. Please check your connection and try again.</p>
    <a class="btn" href="/">Try again</a>
  </div>
</body>
</html>
